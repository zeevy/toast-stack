name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build library
        run: ./gradlew :toaststack:assembleDebug :toaststack:assembleRelease

      - name: Run lint
        run: ./gradlew :toaststack:lintDebug

      - name: Run unit tests
        run: ./gradlew :toaststack:testDebugUnitTest

      - name: Build demo app
        run: ./gradlew :app:assembleDebug

      - name: Run demo app lint
        run: ./gradlew :app:lintDebug

      - name: Verify publish to local Maven
        run: ./gradlew :toaststack:publishReleasePublicationToMavenLocal

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: toaststack/build/reports/tests/

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: |
            toaststack/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.html
