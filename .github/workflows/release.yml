name: Release

on:
  release:
    types: [ published ]

jobs:
  verify:
    name: Verify Release Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run full test suite
        run: ./gradlew :toaststack:testDebugUnitTest

      - name: Build release AAR
        run: ./gradlew :toaststack:assembleRelease

      - name: Verify publish
        run: ./gradlew :toaststack:publishReleasePublicationToMavenLocal

      - name: Upload release AAR
        uses: actions/upload-artifact@v4
        with:
          name: toaststack-release
          path: toaststack/build/outputs/aar/toaststack-release.aar
