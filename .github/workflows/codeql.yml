# CodeQL security scanning.
#
# Runs on pushes, pull requests, and weekly to catch new advisories that
# affect already-merged code.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin, actions]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.language == 'java-kotlin' && 'manual' || 'none' }}

      - name: Set up Gradle
        if: matrix.language == 'java-kotlin'
        uses: gradle/actions/setup-gradle@v6

      - name: Build (manual mode)
        if: matrix.language == 'java-kotlin'
        # CodeQL's tracer hooks compiler process invocations via LD_PRELOAD, so
        # the build MUST actually run kotlinc/javac. --no-build-cache prevents
        # compileDebugKotlin/JavaWithJavac from being served FROM-CACHE on warm
        # runners; otherwise the tracer sees zero compilations and CodeQL fails
        # with "no source code seen during build".
        run: ./gradlew :toaststack:assembleDebug :app:assembleDebug --stacktrace --no-build-cache -x lint

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
