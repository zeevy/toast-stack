## Dependabot keeps Gradle, Kotlin, AndroidX, and GitHub Actions versions
## fresh. PRs land grouped (one per ecosystem per week) so review is light.

version: 2
updates:
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 10
    groups:
      androidx:
        patterns:
          - "androidx.*"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx*"
      compose:
        patterns:
          - "androidx.compose*"
      test-libraries:
        patterns:
          - "org.junit*"
          - "org.robolectric:*"
          - "org.jetbrains.kotlinx:kotlinx-coroutines-test"
    labels:
      - dependencies
      - gradle

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
