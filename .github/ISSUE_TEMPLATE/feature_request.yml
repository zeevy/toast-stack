name: Feature request
description: Suggest a new API, animation, or capability for the library
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please skim the
        [README.md](../README.md) and existing issues first - the feature may
        already exist or be on the roadmap.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or the gap in the current API.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the API look like? A rough call-site snippet is welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other workarounds, similar APIs in other libraries, etc.
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true
